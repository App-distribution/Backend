ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.appdist.ApplicationKt.module ]
    }
}

database {
    url = "jdbc:postgresql://localhost:5432/appdist"
    url = ${?DATABASE_URL}
    user = "appdist"
    user = ${?DATABASE_USER}
    password = "SET_DATABASE_PASSWORD_IN_ENV"
    password = ${?DATABASE_PASSWORD}
    maxPoolSize = 10
}

storage {
    endpoint = "http://localhost:9000"
    endpoint = ${?MINIO_ENDPOINT}
    accessKey = "minioadmin"
    accessKey = ${?MINIO_ACCESS_KEY}
    secretKey = "SET_PRIVATE_VALUE_IN_ENV"
    secretKey = ${?MINIO_SECRET_KEY}
    bucket = "appdist-builds"
    bucket = ${?MINIO_BUCKET}
}

jwt {
    secret = "SET_JWT_SECRET_IN_ENV"
    secret = ${?JWT_SECRET}
    issuer = "appdist"
    audience = "appdist-client"
    accessTokenTtlMinutes = 60
    refreshTokenTtlDays = 30
}

otp {
    ttlMinutes = 5
    length = 6
}

firebase {
    credentialsPath = ${?FIREBASE_CREDENTIALS_PATH}
}
