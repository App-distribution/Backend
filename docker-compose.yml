version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: appdist-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appdist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-appdist}
    ports:
      - 5433
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appdist}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: appdist-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - 9000
      - 9001
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "${DATABASE_URL:-jdbc:postgresql://postgres:5432/${POSTGRES_DB:-appdist}}"
      DATABASE_USER: ${POSTGRES_USER:-appdist}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-appdist-builds}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      JWT_ISSUER: ${JWT_ISSUER:-app-distribution}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-app-distribution-clients}
    ports:
      - 8080

volumes:
  postgres_data:
  minio_data:
